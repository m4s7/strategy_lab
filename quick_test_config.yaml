# Quick Test Configuration - Single Day for Fast Testing
# This config uses only 1 day of data for rapid validation

system:
  version: "1.0.0"
  environment: "development"

  logging:
    level: "INFO"
    file: "logs/strategy_lab.log"
    console: true
    format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

  performance:
    max_memory_gb: 8.0
    parallel_workers: 2
    chunk_size: 10000
    enable_profiling: false

  data:
    data_path: "./data/MNQ"
    cache_enabled: true
    cache_path: "./cache"
    preload_data: false

# Strategy configuration
strategy:
  name: "order_book_imbalance" 
  parameters:
    imbalance_threshold: 0.65
    min_spread: 0.25
    max_position_size: 5
    stop_loss_ticks: 8
    take_profit_ticks: 4
    hold_time_seconds: 30

# Backtesting configuration - SINGLE DAY for quick testing
backtesting:
  start_date: "2025-01-02T00:00:00"
  end_date: "2025-01-02T23:59:59"  # Just 1 day
  initial_capital: 100000
  commission: 2.00
  slippage: 0.25
  contracts: ["03-25"]

  engine:
    commission_rate: 0.001
    slippage_model: "linear"
    slippage_factor: 0.0001
    enable_shorting: true
    margin_requirement: 0.5

# Optimization configuration
optimization:
  method: "grid_search"
  metric: "sharpe_ratio"
  direction: "maximize"
  max_iterations: 10  # Reduced for quick testing
  parallel: false
  random_seed: 42